# ============================================================
# Illumio S3 -> SIEM Collector — 設定範例
# 複製為 config.yaml 後修改；config.yaml 已在 .gitignore 中
# ============================================================
#
# 快速決策：我要收哪些 log？
#
#   log_type: auditable  → PCE 稽核事件（管理操作、VEN 上下線、policy 部署）      ← 必收
#   log_type: pd2        → Blocked（policy 實際 DENY 的連線）                    ← 必收
#   log_type: pd1        → Potentially Blocked（無 allow rule、Enforce 前仍通過） ← 建議收
#   log_type: pd0        → Allowed（所有 allow rule 允許的連線，量極大約 95%+）   ← 選收
#   log_type: pd3        → Unknown（Idle VEN snapshot / Flowlink 網路設備 log 等非 Enforcement 模式被動收到的流量）← 視需要
#
# ============================================================

# ── AWS 認證 ──────────────────────────────────────────────
# 三選一：
#   a) access_key + secret_key（原廠提供的 Access Key 文件）
#   b) profile（AWS CLI 的 named profile，免填 key/secret）
#   c) 兩者皆空（IAM role / 環境變數 AWS_ACCESS_KEY_ID）
aws:
  profile: null                    # AWS CLI profile 名稱，null = 不使用
  access_key: "AKIA..."            # Access Key ID（原廠文件提供）
  secret_key: "..."                # Secret Access Key（原廠文件提供）
  # region 可以不填——boto3 會自動偵測並跟著 S3 redirect 到正確 region。
  # 若連線出現 AuthorizationHeaderMalformed 錯誤才需要填（格式如 "ap-northeast-1"）。
  region: null

# ── S3 來源 ───────────────────────────────────────────────
# fqdn 和 org_id 是 S3 路徑的一部分：{fqdn}/org_id={org_id}/auditable/...
# 填錯會找不到任何檔案
source:
  type: s3
  bucket: "illumio-flow-XXXXXXXX-your-bucket"   # 原廠文件提供
  fqdn: "your-pce.illum.io"                              # PCE FQDN，原廠文件提供
  org_id: "123456"                                      # PCE Org ID，純數字

# ── Checkpoint（斷點續傳）────────────────────────────────
checkpoint:
  dir: ./state                     # 相對路徑會以 config.yaml 所在目錄為基準（可改為絕對路徑）
  initial_lookback_hours: 0        # 第一次啟動往回拉幾小時（0 = 只拉新資料；24 = 拉昨天到現在）
                                   # 同時用於 checkpoint JSON 損毀後的自動恢復起點
                                   # （core/pipeline.py:43-54）。
  atomic_write: true               # 先寫暫存再 rename，避免 crash 時損毀

# ── 日誌 ─────────────────────────────────────────────────
logging:
  level: INFO                      # DEBUG / INFO / WARN / ERROR
  dir: ./logs                      # 相對路徑會以 config.yaml 所在目錄為基準（可改為絕對路徑）
  file: "collector.log"
  rotate_mb: 50                    # 單檔最大 MB，超過自動 rotate
  keep_files: 7                    # 保留幾份舊檔
  console: true                    # 是否同時印到終端

# ── Pipelines ────────────────────────────────────────────
# 每個 pipeline 獨立拉取、獨立 checkpoint、獨立排程。
# 最常見的配置：開 audit + pd2（稽核事件 + Blocked 流量）兩個 pipeline。
pipelines:

  # ── [必收] 稽核事件 ───────────────────────────────────
  # 包含：VEN 上下線、policy 部署成功/失敗、管理員操作、使用者登入
  - name: "audit"
    enabled: true
    log_type: auditable            # 稽核事件
    poll_interval_sec: 60          # 每 60 秒拉一次（稽核事件量少，60s 夠用）
    max_files_per_tick: 1000       # 每次最多處理 1000 個 S3 檔案
    mapper:
      format: syslog_json          # RFC5424 header + 展平 JSON（SIEM 推薦）
      flatten: true                # 展平巢狀 JSON：created_by.agent.hostname → created_by_agent_hostname
    sink:
      type: tls                    # TLS 加密 TCP（推薦）
      host: "siem.example.com"
      port: 6514                   # SIEM TLS syslog 預設 port
      tls:
        verify: true               # 驗證 SIEM 憑證；內部自簽可改 false
        ca_file: null              # 自訂 CA 憑證路徑（null = 使用系統 CA）
      timeout_sec: 10
      max_retries: 3               # 失敗重試 3 次
      retry_backoff_sec: [1, 2, 4] # 重試間隔（秒）

  # ── [必收] Blocked（pd=2）────────────────────────────
  # 被 Illumio policy 實際 DENY 的流量，資安告警的核心來源
  - name: "blocked"
    enabled: true
    log_type: pd2                  # policy decision = 2 = Blocked
    poll_interval_sec: 60
    mapper:
      format: syslog_json
      flatten: true
    sink:
      type: tls
      host: "siem.example.com"
      port: 6514

  # ── [建議收] Potentially Blocked（pd=1）─────────────
  # 沒有對應 allow rule、workload 尚未進入 Enforce 模式因此目前仍允許通過的流量。
  # 用於識別「切換到 Enforce 模式後哪些連線會中斷」，本身並未被封鎖。
  - name: "potentially-blocked"
    enabled: false                 # 需要時改 true
    log_type: pd1                  # policy decision = 1 = PotentiallyBlocked
    poll_interval_sec: 300         # 量比 pd2 大，可以拉長間隔
    mapper:
      format: syslog_json
      flatten: true
    sink:
      type: tls
      host: "siem.example.com"
      port: 6514

  # ── [選收] 允許流量（pd=0）─────────────────────────
  # 被 policy 允許的所有流量。量極大（通常佔 S3 總量 95% 以上），
  # 建議搭配 filter 只收感興趣的 port，否則會佔用大量 SIEM 授權/儲存空間。
  - name: "allowed-sensitive-ports"
    enabled: false
    log_type: pd0                  # policy decision = 0 = Allowed
    poll_interval_sec: 300
    filter:
      expression: "ev.dst_port in (22, 23, 3389, 445, 1433, 3306, 5432)"
      # 只收高風險 port 的允許流量（SSH/Telnet/RDP/SMB/MSSQL/MySQL/PostgreSQL）
    mapper:
      format: syslog_json
      flatten: true
    sink:
      type: tls
      host: "siem.example.com"
      port: 6514

  # ── [進階] 使用 CEF 格式 ────────────────────────────
  # CEF 格式需要 mapping_file 指定欄位對應；
  # 適用於已有 CEF parser 的 SIEM（Splunk / ArcSight）
  - name: "audit-cef"
    enabled: false
    log_type: auditable
    poll_interval_sec: 300
    mapper:
      format: cef
      mapping_file: "mappings/auditable.yaml"   # 欄位對應設定檔
    sink:
      type: tcp
      host: "siem.example.com"
      port: 1470                   # SIEM TCP syslog 預設 port

  # ── [進階] HTTPS batch（Splunk / Elastic）─────────
  - name: "audit-https"
    enabled: false
    log_type: auditable
    poll_interval_sec: 120
    mapper:
      format: json                # 純 JSON，適合 HTTP receiver
      flatten: true
    sink:
      type: https
      url: "https://siem.example.com/rawupload?vendor=Illumio&model=PCE"
      batch_size: 100              # 累積 100 筆再一次送出
      timeout_sec: 10
      max_retries: 3
      retry_backoff_sec: [1, 2, 4]
      # tls:
      #   verify: true                # 預設 true。設 false 僅供測試環境。
      #   ca_file: /path/to/ca.pem    # 自簽憑證鏈。
      # 行為：當所有重試耗盡仍失敗時，sink 會清空批次 buffer 並回傳 False，
      # pipeline 不前進 checkpoint，下一輪 tick 會從 S3 重讀同一檔案重送
      # （at-least-once 語意，可能在批次邊界產生重複）。

  # ── [測試用] UDP（本機 nc -lu 5514 接收）────────────
  - name: "test-udp"
    enabled: false
    log_type: auditable
    poll_interval_sec: 60
    mapper:
      format: syslog_json
      flatten: true
    sink:
      type: udp
      host: "127.0.0.1"
      port: 5514                   # 注意：UDP 每則限制 1024 bytes，長訊息會被截斷
      # max_bytes: 8192 (預設) — 單一 UDP datagram 最大 byte 數，超出截斷。
      # 常見值：1024（老 syslog 設備）/ 8192 / 65535。
      # 註：tcp/tls sink 無此欄位（串流協定不需要切割上限）。

# ============================================================
# 本地留存（file sink）與雙軌模式（multi sink）
# ============================================================
#
# 本地留存功能說明
# ────────────────
# sink.type: file 會將每筆事件以「一行一事件」格式附加到 active log 檔案中。
# Active 檔案（例如 events.log）始終保持明文，可直接被 FortiSIEM Agent、
# Filebeat、tail 等工具即時讀取。
#
# 輪替機制（達到任一條件即觸發）：
#   1. 檔案大小超過 rotation_mb MB
#   2. 檔案已開啟超過 rotation_hours 小時（跨重啟後仍計算真實檔案年齡）
#
# 輪替動作：
#   舊檔 rename → events.<YYYYMMDDThhmmss>.log → gzip 壓縮 → events.<ts>.log.gz
#   壓縮完成後自動刪除超過 retention_days 天的舊 .log.gz 檔案
#
# prefix 說明（重要）：
#   每行會加上 prefix 字首，用於 SIEM Parser 識別。
#   建議保持預設值 "ILLUMIO_FLOW: "（含尾部空格）。
#
#   FortiSIEM Agent 設定：
#     Monitor Template → File Monitor → Log Prefix = ILLUMIO_FLOW
#     （Agent 負責加前綴，此處 prefix 留空）或
#     由本工具加前綴，Agent 設定 "Include keyword" 比對 ILLUMIO_FLOW
#
# ── [本地留存] 僅寫本地檔案，不送 SIEM ──────────────
  - name: "audit-local"
    enabled: false
    log_type: auditable
    poll_interval_sec: 300
    mapper:
      format: json                 # 純 JSON，保留完整欄位，適合長期留存
      flatten: true
    sink:
      type: file
      path: "/var/log/illumio-collector/audit.log"
      #
      # ── rotation_mb（必填，預設 200）─────────────────
      # 單位：MB。Active 檔案超過此大小時觸發輪替。
      # 建議：生產環境 100～500 MB；磁碟空間緊張時調低。
      rotation_mb: 200
      #
      # ── rotation_hours（必填，預設 24）──────────────
      # 單位：小時。Active 檔案開啟超過此時間觸發輪替。
      # 重啟後仍以檔案真實 mtime 計算，不會重置計時器。
      # 建議：24（每日輪替），配合 FortiSIEM 按日期匯入。
      rotation_hours: 24
      #
      # ── retention_days（必填，預設 30）──────────────
      # 單位：天。超過此天數的 .log.gz 自動刪除。
      # 注意：只清理同目錄下符合命名格式 <stem>.<ts>.log.gz 的檔案。
      retention_days: 90           # 稽核事件建議長期保留
      #
      # ── prefix（預設 "ILLUMIO_FLOW: "）──────────────
      # 每行行首加上此字串。空字串 "" 則不加前綴。
      # FortiSIEM Agent 可用 Log Prefix 設定識別此字串。
      prefix: "ILLUMIO_FLOW: "

  - name: "traffic-local"
    enabled: false
    log_type: pd0
    poll_interval_sec: 300
    mapper:
      format: json
      flatten: true
    sink:
      type: file
      path: "/var/log/illumio-collector/traffic.log"
      rotation_mb: 500             # 流量 log 量大，調高輪替門檻
      rotation_hours: 24
      retention_days: 30
      prefix: "ILLUMIO_FLOW: "

# ── [雙軌模式] SIEM 轉送 + 本地留存同時進行 ─────────
#
# Multi sink 說明：
#   同時送給所有子 sink（依序呼叫，非並行）。
#   只有當「全部子 sink 都失敗」時，才回傳失敗並停止 checkpoint 前進。
#   即：SIEM 暫時斷線不影響本地寫入；本地磁碟寫失敗不影響 SIEM 轉送。
#
#   Nesting：multi sink 內可以再嵌套 multi sink（理論上不需要）。
#
  - name: "audit-dual"
    enabled: false
    log_type: auditable
    poll_interval_sec: 60
    mapper:
      format: syslog_json          # SIEM 用 syslog_json；本地用相同格式便於對照
      flatten: true
    sink:
      type: multi
      sinks:
        # 子 sink 1：TLS 轉送到 SIEM（與一般 SIEM-only 設定相同）
        - type: tls
          host: "siem.example.com"
          port: 6514
          tls:
            verify: true
            ca_file: null
          timeout_sec: 10
          max_retries: 3
          retry_backoff_sec: [1, 2, 4]
        # 子 sink 2：本地留存
        - type: file
          path: "/var/log/illumio-collector/audit.log"
          rotation_mb: 200
          rotation_hours: 24
          retention_days: 90
          prefix: "ILLUMIO_FLOW: "

  - name: "blocked-dual"
    enabled: false
    log_type: pd2
    poll_interval_sec: 60
    mapper:
      format: syslog_json
      flatten: true
    sink:
      type: multi
      sinks:
        - type: tls
          host: "siem.example.com"
          port: 6514
        - type: file
          path: "/var/log/illumio-collector/blocked.log"
          rotation_mb: 200
          rotation_hours: 24
          retention_days: 30
          prefix: "ILLUMIO_FLOW: "
